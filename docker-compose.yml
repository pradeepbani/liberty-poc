
services:
  liberty-app:
    image: liberty-poc
    container_name: liberty-app
    ports:
      - "9080:9080"
    networks:
      - poc-network

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - liberty-app
    networks:
      - poc-network

networks:
  poc-network:
    driver: bridge